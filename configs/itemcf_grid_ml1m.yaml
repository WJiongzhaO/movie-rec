# ItemCF 超参网格搜索 —— 真实 MovieLens 1M
# 调优对象:topk_neighbors(预测时取多少个最相似物品)。
# 文献参考:MovieLens 上 item-based CF 最优 k 多落在 20~40 区间
# (Aljunid 2021, CAAI Trans. Intelligence Technology),故粗筛区间围绕此中心展开,
# 不取过宽(避免相邻候选差异被淹没、得不到好结果)。
data:
  source: movielens
  params: {}
split:
  test_ratio: 0.2
model:
  name: itemcf
  params: {}
eval:
  k: 10
  relevance_threshold: 4.0

optimize: rmse

grid:
  topk_neighbors: [10, 20, 40, 80, 160]

refine:
  enabled: true
  n_between: 1
