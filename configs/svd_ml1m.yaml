data:
  source: movielens
  params: {}
split:
  test_ratio: 0.2
model:
  name: svd
  params:
    n_factors: 50
    n_epochs: 20
    lr: 0.005
    reg: 0.02
    seed: 42
eval:
  k: 10
  relevance_threshold: 4.0
# 网格搜索用 n_epochs=8 做粗筛省时,曾误选 n_factors=100/reg=0.015;
# 在 n_epochs=20 完整训练下复核,n_factors=50/reg=0.02 才是真正 RMSE 最优(0.8897<0.9001),
# 说明粗筛阶段的小 epoch 会低估大模型——已据此修正为完整训练下的真实最优。
note: "真实 MovieLens 1M - SVD 矩阵分解(完整训练复核后:n_factors=50, reg=0.02, RMSE=0.8897)"
